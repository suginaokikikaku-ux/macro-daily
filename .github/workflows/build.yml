name: Daily Build

on:
  workflow_dispatch:
  schedule:
    - cron: "5 22 * * *" # JST 07:05

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Tokyo
      SITE_URL: ${{ vars.SITE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch news
        run: npm run fetch

      - name: Summarize news
        run: npm run summarize
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build articles
        run: npm run build

      - name: Build index
        run: npm run build:index

      - name: Build category pages
        run: npm run build:categories

      - name: Build knowledge pages
        run: npm run build:knowledge

      - name: Debug generated files
        run: |
          echo "=== root html ==="
          ls -la *.html || true
          echo "=== basics ==="
          find basics -maxdepth 3 -type f | sort || true
          echo "=== posts ==="
          find posts -maxdepth 1 -type f | sort || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "daily update"
          git fetch origin main
          git pull --rebase origin main
          git push origin main
