<h2>ドル円とは</h2>
USD/JPY は米ドルと日本円の通貨ペアです。日本人にとって一番馴染みがあり、ニュースとの接続も分かりやすい通貨ペアです。</p><h2>見るべき理由</h2>
<ul><li>日本語情報が多い</li>
<li>米金利や日銀政策の影響を受けやすい</li>
<li>マクロニュースとの接続が分かりやすい</li></p><h2>初心者が混乱しやすい点</h2>
<li>ドルが強いのか、円が弱いのかを分けて考える</li>
<li>「ドル円上昇 = ドル買い / 円売り」の両面で考える</li></ul>
